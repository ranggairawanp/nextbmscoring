<title>Group Leader · Batch 2 · BSI BBS Scoring 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00A39D; --teal-dk:#007E79; --teal-soft:#E4F4F3;
  --gold:#F8AD3C; --gold-dk:#D98E1A;
  --ink:#0E1B1A; --ink-2:#16302E; --slate:#5A6B69;
  --paper:#FBFAF7; --line:#DCE5E4; --card:#FFFFFF;
  --ok:#1E9E6A; --warn:#C9821B; --bad:#B23B47;
  --z-distress:#8C2F39; --z-recovery:#9A8C7A; --z-target:#F8AD3C; --z-outperform:#00A39D;
  --r:14px; --r-sm:9px;
  --shadow:0 1px 2px rgba(14,27,26,.05),0 8px 24px -12px rgba(14,27,26,.18);
  --font-d:'Bricolage Grotesque',serif; --font-b:'IBM Plex Sans',sans-serif; --font-m:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-b);color:var(--ink);background:var(--paper);
  -webkit-font-smoothing:antialiased;line-height:1.5;font-size:15px}
h1,h2,h3,h4{font-family:var(--font-d);font-weight:700;letter-spacing:-.01em;line-height:1.15}
.mono{font-family:var(--font-m);font-variant-numeric:tabular-nums}
a{color:inherit}
button{font-family:var(--font-b);cursor:pointer;border:none}
::selection{background:var(--teal);color:#fff}

/* lockup logo · Danantara kiri, BSI kanan · plat putih, aman di semua latar */
.lockup{display:inline-flex;align-items:center;gap:13px;background:#fff;
  border:1px solid var(--line);border-radius:11px;padding:7px 14px}
.lockup img{display:block;width:auto;height:30px}
.lockup .sep{width:1px;height:24px;background:#E2E8E7}

/* kartu */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow)}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--teal)}

/* tombol */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 22px;border-radius:var(--r-sm);font-weight:600;font-size:14.5px;
  background:var(--teal);color:#fff;transition:transform .12s,filter .12s}
.btn:hover{filter:brightness(1.06)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.45;cursor:not-allowed;filter:none}
.btn-ghost{background:transparent;color:var(--teal);border:1.5px solid var(--line)}
.btn-gold{background:var(--gold);color:var(--ink)}

/* indikator koneksi Firebase · dipakai semua halaman live */
.fb-pill{position:fixed;right:14px;bottom:14px;z-index:90;display:flex;align-items:center;
  gap:7px;padding:7px 13px;border-radius:999px;background:var(--card);
  border:1px solid var(--line);box-shadow:var(--shadow);font-size:12px;font-weight:600}
.fb-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--slate)}
.fb-pill.on .dot{background:var(--ok);box-shadow:0 0 0 3px rgba(30,158,106,.18)}
.fb-pill.off .dot{background:var(--bad);box-shadow:0 0 0 3px rgba(178,59,71,.18)}
.fb-pill.on .txt{display:none}
.fb-pill.on{padding:7px;gap:0}

/* zona CM Tracker · warna terkunci dari master */
.zona{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;
  font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.zona.distress{background:rgba(140,47,57,.12);color:var(--z-distress)}
.zona.recovery{background:rgba(154,140,122,.16);color:#6E6253}
.zona.target_spm{background:rgba(248,173,60,.18);color:var(--gold-dk)}
.zona.outperform{background:rgba(0,163,157,.14);color:var(--teal-dk)}

/* toast */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  z-index:120;background:var(--ink);color:#fff;padding:12px 20px;border-radius:var(--r-sm);
  font-size:13.5px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;max-width:88vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--bad)}

.tnum{font-family:var(--font-m);font-variant-numeric:tabular-nums}

/* topbar bersama */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:13px 24px;background:var(--card);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:50}
.topbar .tb-right{display:flex;align-items:center;gap:12px}
.role-badge{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:999px;
  background:var(--teal-soft);font-size:12.5px;font-weight:700;color:var(--teal-dk)}
.role-badge .rb-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex:none}

/* tier · warna terkunci: Optimal teal, Plausible gold, Suboptimal slate, Trap merah */
.tier{--tc:var(--slate);--tb:rgba(90,107,105,.12);--tbd:rgba(90,107,105,.4)}
.tier.optimal{--tc:var(--teal-dk);--tb:rgba(0,163,157,.12);--tbd:var(--teal)}
.tier.plausible{--tc:var(--gold-dk);--tb:rgba(248,173,60,.18);--tbd:var(--gold)}
.tier.suboptimal{--tc:#6E6253;--tb:rgba(154,140,122,.18);--tbd:#9A8C7A}
.tier.trap{--tc:var(--bad);--tb:rgba(178,59,71,.12);--tbd:var(--bad)}
.tier-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;
  font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  background:var(--tb);color:var(--tc)}

/* input angka bersama */
.num-field{display:flex;flex-direction:column;gap:5px}
.num-field label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--slate)}
.num-field input{padding:10px 12px;border:1.5px solid var(--line);border-radius:var(--r-sm);
  font-family:var(--font-m);font-size:15px;font-weight:600;color:var(--ink);
  background:var(--paper);width:100%}
.num-field input:focus{outline:none;border-color:var(--teal);background:#fff;
  box-shadow:0 0 0 3px var(--teal-soft)}

@media print{.fb-pill,#toast{display:none}}

/* banner gagal Firebase + gerbang identitas */
.fb-fail{background:var(--bad);color:#fff;padding:12px 20px;font-size:13px;
  font-weight:600;text-align:center;line-height:1.5}
.id-gate{min-height:100dvh;display:grid;place-items:center;padding:24px;background:var(--paper)}
.id-card{max-width:380px;text-align:center;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:34px 30px;box-shadow:var(--shadow)}
.id-card .id-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--teal)}
.id-card h1{font-size:22px;margin:10px 0 8px}
.id-card p{font-size:13.5px;color:var(--slate);line-height:1.55}
.id-btn{display:inline-block;margin-top:20px;padding:12px 24px;border-radius:var(--r-sm);
  background:var(--teal);color:#fff;font-weight:600;font-size:14px;text-decoration:none}

.ld-main{max-width:560px;margin:0 auto;padding:26px 20px 80px}
.ld-state{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow)}
.ld-state .row{display:flex;align-items:center;justify-content:space-between}
.ld-state .lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--slate)}
.ld-state .ronde{font-family:var(--font-d);font-weight:800;font-size:17px}
.ld-state .tema{font-size:12.5px;color:var(--slate);margin-top:2px}
.ld-state .mygrp{font-family:var(--font-d);font-weight:800;font-size:16px;color:var(--teal-dk)}

.assess-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:20px 18px;box-shadow:var(--shadow)}
.assess-card .eyebrow{margin-bottom:8px}
.assess-card h2{font-size:20px;margin-bottom:4px}
.assess-card .who-now{font-family:var(--font-d);font-weight:800;color:var(--teal-dk)}
.assess-card .sub{font-size:13px;color:var(--slate);margin-bottom:18px}


.state-msg{text-align:center;padding:34px 20px}
.state-msg .ico{width:54px;height:54px;border-radius:50%;margin:0 auto 14px;
  display:grid;place-items:center;font-size:24px}
.state-msg.wait .ico{background:var(--teal-soft);color:var(--teal-dk)}
.state-msg.self .ico{background:rgba(248,173,60,.2);color:var(--gold-dk)}
.state-msg.locked .ico{background:var(--ink);color:#fff}
.state-msg h2{font-size:18px;margin-bottom:6px}
.state-msg p{font-size:13.5px;color:var(--slate);max-width:34ch;margin:0 auto}
.state-msg .final-tier{margin-top:14px}

.vote-status{margin-top:16px;text-align:center;font-size:12.5px;font-weight:600;
  color:var(--teal-dk)}
.vote-status.muted{color:var(--slate);font-weight:500}


/* v4 · grid tier empat indikator */
.indik-list{display:flex;flex-direction:column;gap:13px;margin-bottom:4px}
.indik-block .indik-label{display:flex;justify-content:space-between;align-items:baseline;
  font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px}
.indik-block .indik-label .w{font-size:10px;color:var(--slate);font-weight:600}
.tier-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.tier-row.r3{grid-template-columns:repeat(3,1fr)}
.tbtn{padding:12px 6px;border-radius:10px;border:1.8px solid var(--line);
  background:var(--card);text-align:center;cursor:pointer;transition:.13s;
  font-family:var(--font-d);font-weight:800;font-size:13px;color:var(--tc)}
.tbtn:hover{border-color:var(--tbd)}
.tbtn.on{border-color:var(--tbd);background:var(--tb)}
.self-final{margin-top:16px}
.self-final .sf-l{font-size:11px;color:var(--slate);font-weight:700;
  margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.sf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.sf-cell{display:flex;flex-direction:column;gap:5px;border:1px solid var(--line);
  border-radius:9px;padding:9px 11px}
.sf-cell .sf-n{font-size:10.5px;color:var(--slate);font-weight:700}
</style>
</head>

/* Pustaka Formula Scoring · BSI BBS v4 */
const FX = (function(){
  const cab = {}; MASTER.cabang.forEach(c=>cab[c.id]=c);
  const grpToCab = {}; MASTER.kelompok.forEach((g,i)=>grpToCab[i+1]=g.id);
  const ROUNDS = MASTER.ronde.length;
  const TPTS = MASTER.branch_performance_meter.tier_poin;
  const WT = {}; MASTER.branch_performance_meter.indikator.forEach(x=>WT[x.id]=x.bobot);
  const DCM = MASTER.delta_cm.per_ronde;
  const SIG = MASTER.delta_cm.sigma_setahun;
  const BPM_FLOOR=-50, BPM_CEIL=60;                            // L3/CPI envelope tier murni
  const BPMK_CEIL=90;                                                  // Skor Kelompok envelope memuat Amanah, -50..+90
  const BPD = MASTER.business_plan_defense || null;            // Business Plan Defense, komponen 15% L3
  const BPDW = {}; if(BPD){ BPD.indikator.forEach(x=>BPDW[x.id]=x.bobot); }
  const BPDF = BPD ? BPD.tier_faktor : {};

  function cabang(idOrIdx){
    if(typeof idOrIdx==='number') return cab[grpToCab[idOrIdx]];
    return cab[idOrIdx];
  }
  /* Zona CM Tracker · label kualitatif dari rasio CM Tahunan / RBB. Persentase tidak ditampilkan. */
  function zonaOf(rasio){
    for(const z of MASTER.model_zona.tingkat){
      const lo=z.min_rasio==null?-1e9:z.min_rasio, hi=z.max_rasio==null?1e9:z.max_rasio;
      if(rasio>=lo && rasio<hi) return z;
    }
    return rasio>=1.10?MASTER.model_zona.tingkat[0]
                      :MASTER.model_zona.tingkat[MASTER.model_zona.tingkat.length-1];
  }
  function tierPts(t){ return (t&&TPTS[t]!=null)?TPTS[t]:0; }
  /* Delta CM ronde · ditentukan tier indikator CM Quality, tabel seragam lima cabang (Rp Juta). */
  function deltaCmRonde(roundKey, cmqTier){
    const row=DCM[roundKey]||{}; return (cmqTier&&row[cmqTier]!=null)?row[cmqTier]:0;
  }
  /* BPM ronde · blend tertimbang 40/25/20/15 dari poin tier empat indikator. */
  function bpmRonde(t){
    if(!t) return 0;
    return tierPts(t.cmq)*WT.cmq + tierPts(t.risk)*WT.risk
         + tierPts(t.people)*WT.people + tierPts(t.csat)*WT.csat;
  }
  /* BPM Aggregate Weighted dari akumulasi poin per indikator. Identik dengan Σ BPM ronde. */
  function bpmWeighted(b){
    if(!b) return 0;
    return (b.cm||0)*WT.cmq+(b.risk||0)*WT.risk+(b.people||0)*WT.people+(b.csat||0)*WT.csat;
  }
  function normIndex(val,floor,ceil){
    if(ceil<=floor) return 0;
    const x=(val-floor)/(ceil-floor)*100;
    return x<0?0:x>100?100:x;
  }
  /* Envelope global · Σ Delta CM -200..+1680. Skor Kelompok BPM -50..+90 (memuat Amanah), L3/CPI BPM -50..+60 (tier murni). */
  function cmIndex(sigmaDelta){ return normIndex(sigmaDelta||0, SIG.trap, SIG.optimal); }
  function bpmIndex(bpmTotal){ return normIndex(bpmTotal||0, BPM_FLOOR, BPMK_CEIL); }
  /* Skor Kelompok 0-100 = 70% Σ Delta CM ternormalisasi + 30% BPM Total ternormalisasi (tier + Koin Amanah). */
  function skorKelompok(sigmaDelta,bpmTotal){
    return 0.70*cmIndex(sigmaDelta)+0.30*bpmIndex(bpmTotal);
  }
  /* Panel Tier Assessment · tier final dari suara, GM penentu bila seri. */
  function tierFinal(gmVote, peerVotes){
    const all=[gmVote].concat(peerVotes||[]).filter(Boolean);
    if(all.length===0) return null;
    const tally={}; all.forEach(t=>tally[t]=(tally[t]||0)+1);
    let best=null,bestN=-1,tie=false;
    for(const t in tally){
      if(tally[t]>bestN){ best=t; bestN=tally[t]; tie=false; }
      else if(tally[t]===bestN){ tie=true; }
    }
    return tie?gmVote:best;
  }
  function indeksPredikat(n){ if(n>=90)return 4; if(n>=80)return 3; if(n>=70)return 2; return 1; }
  function predikat(n){ if(n>=90)return 'A'; if(n>=80)return 'B'; if(n>=70)return 'C'; return 'D'; }
  function cpi(idxPost,idxSim){ return (idxPost*2+idxSim*16)/18; }
  function behaviorScore(dims){
    let s=0; const kv=MASTER.behavior_6d.konversi_100;
    MASTER.behavior_6d.dimensi.forEach(d=>{ s+=(kv[dims[d.id]]||0)*d.bobot; });
    return s;
  }
  /* BPM kumulatif tier (-50..+60) dinormalkan ke 0-100. */
  function bpm100(bpmCum){
    const c=Math.max(BPM_FLOOR,Math.min(BPM_CEIL,bpmCum||0));
    return (c-BPM_FLOOR)/(BPM_CEIL-BPM_FLOOR)*100;
  }
  /* Business Plan Defense · faktor tier per indikator (business/risk/people/csat),
     blend tertimbang 35/25/20/20. Rentang 0,85..1,00. Tidak menyentuh CM, layar, ranking. */
  function bpdFactor(t){ return (t && BPDF[t]!=null) ? BPDF[t] : null; }
  function bpdValue(b){
    if(!BPD || !b) return null;
    let f=0;
    for(const ind of BPD.indikator){
      const fac=bpdFactor(b[ind.id]);
      if(fac==null) return null;            // butuh keempat indikator final
      f += fac*ind.bobot;
    }
    return f;                               // 0,85..1,00
  }
  /* Nilai Defense untuk L3 · BPD×100, rentang 85..100. null bila belum lengkap. */
  function defense100(b){ const v=bpdValue(b); return v==null?null:v*100; }
  /* L3 individu · 30% BPM + 55% Skor Perilaku 6D + 15% Business Plan Defense.
     Pra-Defense: (0.30 BPM + 0.55 Perilaku) dibagi 0.85 agar tetap pada skala 0..100. */
  function l3(bpmCum, perilaku100, def100){
    const bp = 0.30*bpm100(bpmCum);
    const be = 0.55*(perilaku100||0);
    if(def100==null || isNaN(def100)){ return (bp + be) / 0.85; }
    return bp + be + 0.15*def100;
  }
  /* Derivasi posisi cabang dari snapshot /tier RTDB.
     v4: /tier/r{n}/{cabang} = {final, cmq, risk, people, csat} tier per indikator. */
  function deriveAll(tierSnap, amanahSnap, bpdSnap){
    tierSnap=tierSnap||{}; amanahSnap=amanahSnap||{}; bpdSnap=bpdSnap||{};
    return MASTER.cabang.map(c=>{
      let cmImpact=0, bpmCum=0, roundsDone=0;
      const pts={cmq:0,risk:0,people:0,csat:0};
      for(let n=1;n<=ROUNDS;n++){
        const t=tierSnap['r'+n] && tierSnap['r'+n][c.id];
        if(t && t.final){
          cmImpact += deltaCmRonde('r'+n, t.cmq);
          bpmCum   += bpmRonde(t);
          pts.cmq+=tierPts(t.cmq); pts.risk+=tierPts(t.risk);
          pts.people+=tierPts(t.people); pts.csat+=tierPts(t.csat);
          roundsDone++;
        }
      }
      let amanah=0; const am=amanahSnap[c.id];
      const AMAX=MASTER.amanah_points.maks_per_ronde; if(am){ for(let n=1;n<=ROUNDS;n++){ var _t=tierSnap['r'+n]&&tierSnap['r'+n][c.id]; if(_t&&_t.final) amanah+=Math.min(AMAX,Math.max(0,+am['r'+n]||0)); } }
      const bpmTotal=bpmCum+amanah;
      const bpdRec=bpdSnap[c.id];
      const def100=(bpdRec&&bpdRec.final)?defense100(bpdRec):null;
      const cmTahunan=c.cm_fy2025_jt+cmImpact;
      const rasio=c.rbb_cm_jt?cmTahunan/c.rbb_cm_jt:0;
      const cmPerFte=c.fte?cmTahunan/c.fte:0;
      const bpm={cm:pts.cmq,risk:pts.risk,people:pts.people,csat:pts.csat};
      return {
        id:c.id, nama:c.nama, kelas:c.kelas,
        roundsDone, cmImpact, deltaCm:cmImpact, cmTahunan,
        baseline:c.cm_fy2025_jt, rbb:c.rbb_cm_jt, fte:c.fte,
        rasio, zona:zonaOf(rasio), cmPerFte,
        bpm, bpmCum, amanah, bpmSum:bpmCum, bpmTotal,
        bpmWeighted:bpmCum, defense100:def100, bpd:(def100==null?null:def100/100),
        skorKelompok:skorKelompok(cmImpact,bpmCum+amanah)
      };
    });
  }
  return {cabang, grpToCab, zonaOf, tierPts, deltaCmRonde, bpmRonde, bpmWeighted,
          cmIndex, bpmIndex, skorKelompok, tierFinal, indeksPredikat, predikat, cpi,
          behaviorScore, bpm100, l3, deriveAll, bpdValue, defense100, bpdFactor,
          cmTahunan:function(br,imp){return cabang(br).cm_fy2025_jt+(imp||0);}};
})();

/* Format rupiah juta ringkas: 1449.5 → "Rp 1.449,5 jt" ; >=1000 jt → "Rp 1,45 M". */
function rpJt(v){
  if(v==null||isNaN(v)) return '—';
  const neg=v<0; v=Math.abs(v);
  let s;
  if(v>=1000){ s='Rp '+(v/1000).toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2})+' M'; }
  else      { s='Rp '+v.toLocaleString('id-ID',{minimumFractionDigits:1,maximumFractionDigits:1})+' jt'; }
  return (neg?'−':'')+s;
}
function pct(r){ return (r*100).toLocaleString('id-ID',{minimumFractionDigits:1,maximumFractionDigits:1})+'%'; }

function getIdentity(){
  let me=null;
  try{ me=JSON.parse(sessionStorage.getItem('bsi_access')||'null'); }catch(e){}
  if(me&&me.role) return me;
  const k=((new URLSearchParams(location.search)).get('k')||'').toUpperCase().trim();
  if(k&&ACCESS_CODES[k]){
    const a=ACCESS_CODES[k];
    me={code:k,role:a.role,g:a.g,lbl:a.lbl};
    try{ sessionStorage.setItem('bsi_access',JSON.stringify(me)); }catch(e){}
    try{ history.replaceState(null,'',location.pathname); }catch(e){}
    return me;
  }
  return null;
}

/* Namespace batch \u00b7 seluruh data halaman ditulis di bawah /batch2
   sehingga Batch 1 dan Batch 2 yang berjalan paralel tidak pernah
   berbagi jalur data. */
const NS = "/batch2";
function dbRef(p){ return DB.ref(NS + p); }
/* Pengikat indikator koneksi pada .fb-pill. Aman saat SDK gagal. */
function bindConnState(){
  const pill=document.querySelector('.fb-pill'); if(!pill) return;
  if(!FB_OK){
    pill.classList.remove('on'); pill.classList.add('off');
    const t=pill.querySelector('.txt'); if(t) t.textContent='Sistem tidak aktif';
    return;
  }
  DB.ref('.info/connected').on('value',s=>{
    const on=s.val()===true;
    pill.classList.toggle('on',on); pill.classList.toggle('off',!on);
    const t=pill.querySelector('.txt'); if(t) t.textContent=on?'Tersambung':'Menyambung';
  });
}
/* Panggil di awal logika halaman yang butuh DB. Bila false, hentikan alur DB. */
function requireFB(){
  if(FB_OK) return true;
  document.body.insertAdjacentHTML('afterbegin',
    '<div class="fb-fail">Koneksi Supabase gagal dimuat. Sistem penilaian ini harus '
    +'dijalankan dari server dengan internet aktif (Vercel atau http server lokal), '
    +'bukan dibuka langsung sebagai berkas atau di jendela pratinjau.</div>');
  return false;
}

<div id="toast"></div><script>function showToast(m,k){var t=document.getElementById("toast");t.textContent=m;t.className="show"+(k==="err"?" err":"");clearTimeout(t._h);t._h=setTimeout(function(){t.className="";},2600);}</script>

<script>
(function(){
const GROUPS=MASTER.kelompok, ROUNDS=MASTER.ronde, TIERS=MASTER.tier_keputusan.tingkat;
const INDIK=MASTER.branch_performance_meter.indikator;

/* identitas peran · sessionStorage atau parameter URL ?k= */
const ME=getIdentity();
if(!ME||ME.role!=='leader'||!ME.g){ identityGate(); return; }
if(!requireFB()) return;
const MY_GID=GROUPS[ME.g-1].id;
const MY_NAME=GROUPS[ME.g-1].nama;
document.getElementById('myGroup').textContent=MY_NAME;

let S={round:1,presenting:null,phase:'idle',locked:false};
let T=null, tierRef=null;

function tierLabel(id){const t=TIERS.find(x=>x.id===id);return t?t.label:'\u2014';}
function groupName(gid){const g=GROUPS.find(x=>x.id===gid);return g?g.nama:gid;}
function tierChip(id){
  if(!id) return '<span class="tier-chip">\u2014</span>';
  return '<span class="tier-chip tier '+id+'">'+tierLabel(id)+'</span>';
}
function roundTiers(n){
  const r=ROUNDS[n-1];
  const ids=(r&&r.tier)||['optimal','plausible','suboptimal','trap'];
  return TIERS.filter(t=>ids.indexOf(t.id)>=0);
}

/* ── Render panel sesuai keadaan ───────────────────────────────────────── */
function render(){
  const p=document.getElementById('panel');

  if(!S.presenting){
    p.innerHTML=stateMsg('wait','&#9203;','Menunggu Penilaian Dibuka',
      'Game Master belum memilih kelompok yang dinilai. Layar ini akan terbuka otomatis.');
    return;
  }
  if(S.presenting===MY_GID){
    let extra='';
    if(T&&T.final){
      extra='<div class="self-final"><div class="sf-l">Tier Final per Indikator</div>'
        +'<div class="sf-grid">';
      INDIK.forEach(ind=>{
        extra+='<div class="sf-cell"><span class="sf-n">'+ind.label+'</span>'
          +tierChip(T[ind.id])+'</div>';
      });
      extra+='</div></div>';
    }
    p.innerHTML=stateMsg('self','&#9733;','Kelompok Anda Sedang Dinilai',
      'Panel sedang menilai keputusan '+MY_NAME+'. Anda tidak memberi suara untuk '
      +'kelompok sendiri.'+extra);
    return;
  }

  // kelompok lain sedang dinilai → Group Leader memberi suara per indikator
  const my=(T&&T.peers&&T.peers[MY_GID])||{};
  const locked=(T&&T.final)?true:false;
  const tiers=roundTiers(S.round);

  let h='<div class="assess-card"><div class="eyebrow">Panel Tier Assessment</div>'
    +'<h2>Nilai Keputusan <span class="who-now">'+groupName(S.presenting)+'</span></h2>'
    +'<p class="sub">Tetapkan tier tiap indikator untuk kelompok '
    +groupName(S.presenting)+'. Empat indikator dinilai terpisah.</p>'
    +'<div class="indik-list">';
  INDIK.forEach(ind=>{
    h+='<div class="indik-block"><div class="indik-label"><span>'+ind.label+'</span>'
      +'<span class="w">bobot '+Math.round(ind.bobot*100)+'%</span></div>'
      +'<div class="tier-row'+(tiers.length===3?' r3':'')+'">';
    tiers.forEach(t=>{
      const on=my[ind.id]===t.id;
      h+='<button class="tbtn tier '+t.id+(on?' on':'')+'"'
        +(locked?' disabled style="opacity:.55;cursor:not-allowed"':'')
        +' data-i="'+ind.id+'" data-t="'+t.id+'">'+t.label+'</button>';
    });
    h+='</div></div>';
  });
  h+='</div>';

  const done=INDIK.filter(ind=>my[ind.id]).length;
  const complete=done===INDIK.length;
  const submitted=my._submitted===true;
  if(locked){
    h+='<div class="vote-status">&#128274; Penilaian sudah dikunci Game Master.</div>';
  }else if(submitted&&complete){
    h+='<div class="vote-status">&#10003; Penilaian Anda sudah terkirim lengkap. Masih bisa diubah hingga GM finalisasi.</div>';
  }else if(complete){
    h+='<div class="vote-status">Empat indikator terpilih. Tekan Kirim Penilaian Saya untuk mengonfirmasi.</div>';
  }else if(done>0){
    h+='<div class="vote-status">'+done+' dari 4 indikator dipilih. Lengkapi sisanya.</div>';
  }else{
    h+='<div class="vote-status muted">Belum memilih. Suara Anda menjadi satu dari '
      +'lima per indikator.</div>';
  }
  if(!locked){
    var sdis=(!complete||submitted);
    h+='<div style="margin-top:14px;text-align:center"><button class="btn btn-gold" id="ldSubmit"'
      +(sdis?' disabled':'')+'>'+(submitted?'&#10003; Sudah Terkirim':'Kirim Penilaian Saya')+'</button></div>';
  }
  h+='</div>';
  p.innerHTML=h;

  if(!locked){
    p.querySelectorAll('.tbtn').forEach(b=>{
      b.onclick=()=>vote(b.dataset.i,b.dataset.t);
    });
    var sb=document.getElementById('ldSubmit');
    if(sb&&complete&&!submitted) sb.onclick=submitMine;
  }
}

function stateMsg(cls,ico,title,desc){
  return '<div class="assess-card"><div class="state-msg '+cls+'">'
    +'<div class="ico">'+ico+'</div><h2>'+title+'</h2><p>'+desc+'</p></div></div>';
}

/* ── Aksi: kirim suara per indikator ───────────────────────────────────── */
function vote(indikId,tierId){
  if(!S.presenting||S.presenting===MY_GID) return;
  if(S.locked){ showToast('Sesi terkunci','err'); return; }
  var u={}; u[indikId]=tierId; u._submitted=false;
  dbRef('/tier/r'+S.round+'/'+S.presenting+'/peers/'+MY_GID).update(u)
    .then(()=>showToast(indikId.toUpperCase()+' terpilih: '+tierLabel(tierId)))
    .catch(()=>showToast('Gagal mengirim suara','err'));
}
function submitMine(){
  if(!S.presenting||S.presenting===MY_GID) return;
  if(S.locked){ showToast('Sesi terkunci','err'); return; }
  dbRef('/tier/r'+S.round+'/'+S.presenting+'/peers/'+MY_GID+'/_submitted').set(true)
    .then(()=>showToast('Penilaian Anda terkirim lengkap'))
    .catch(()=>showToast('Gagal mengirim','err'));
}

/* ── Listener /tier ────────────────────────────────────────────────────── */
function attachTier(){
  if(tierRef){ tierRef.off(); tierRef=null; }
  if(!S.presenting){ T=null; render(); return; }
  tierRef=dbRef('/tier/r'+S.round+'/'+S.presenting);
  tierRef.on('value',snap=>{ T=snap.val()||{}; render(); });
}

/* ── Listener /session ─────────────────────────────────────────────────── */
dbRef('/session').on('value',snap=>{
  const s=snap.val()||{};
  S.round=s.currentRound||1;
  S.presenting=s.presenting||null;
  S.phase=s.phase||'idle';
  S.locked=!!s.locked;
  const r=ROUNDS[S.round-1]||{kode:'\u2014',tema:''};
  document.getElementById('rondeKode').textContent=r.kode;
  document.getElementById('rondeTema').textContent=r.tema;
  attachTier();
});

/* ── Business Plan Defense · Group Leader menilai kelompok lain ─────────── */
(function(){
  const BPDIND=MASTER.business_plan_defense.indikator;
  const BPDTIERS=MASTER.tier_keputusan.tingkat;
  let BP=null, bpref=null, pres=null, cur=undefined;
  function gname(gid){ const g=GROUPS.find(x=>x.id===gid); return g?g.nama:gid; }
  function smsg(cls,ico,title,desc){
    return '<div class="assess-card"><div class="state-msg '+cls+'"><div class="ico">'+ico+
      '</div><h2>'+title+'</h2><p>'+desc+'</p></div></div>';
  }
  function render(){
    const p=document.getElementById('bpdPanel'); if(!p) return;
    if(!pres){ p.innerHTML=''; return; }
    if(pres===MY_GID){
      p.innerHTML=smsg('self','&#9733;','Defense Kelompok Anda Sedang Dinilai',
        'Panel sedang menilai Business Plan '+MY_NAME+'. Anda tidak menilai kelompok sendiri.');
      return;
    }
    const my=(BP&&BP.peers&&BP.peers[MY_GID])||{};
    const locked=(BP&&BP.final)?true:false;
    let h='<div class="assess-card"><div class="eyebrow">Business Plan Defense</div>'
      +'<h2>Nilai Defense <span class="who-now">'+gname(pres)+'</span></h2>'
      +'<p class="sub">Empat indikator dinilai terpisah. Optimal 100% &middot; Plausible 95% &middot; '
      +'Suboptimal 90% &middot; Trap 85%.</p><div class="indik-list">';
    BPDIND.forEach(ind=>{
      h+='<div class="indik-block"><div class="indik-label"><span>'+ind.label+'</span>'
        +'<span class="w">bobot '+Math.round(ind.bobot*100)+'%</span></div><div class="tier-row">';
      BPDTIERS.forEach(t=>{ const on=my[ind.id]===t.id;
        h+='<button class="tbtn tier '+t.id+(on?' on':'')+'"'
          +(locked?' disabled style="opacity:.55;cursor:not-allowed"':'')
          +' data-i="'+ind.id+'" data-t="'+t.id+'">'+t.label+'</button>'; });
      h+='</div></div>';
    });
    h+='</div>';
    const done=BPDIND.filter(ind=>my[ind.id]).length;
    const complete=done===BPDIND.length;
    const submitted=my._submitted===true;
    if(locked) h+='<div class="vote-status">&#128274; Defense sudah dikunci Game Master.</div>';
    else if(submitted&&complete) h+='<div class="vote-status">&#10003; Penilaian Defense Anda sudah terkirim lengkap. Masih bisa diubah hingga finalisasi.</div>';
    else if(complete) h+='<div class="vote-status">Empat indikator terpilih. Tekan Kirim Penilaian Saya untuk mengonfirmasi.</div>';
    else if(done>0) h+='<div class="vote-status">'+done+' dari 4 indikator dipilih. Lengkapi sisanya.</div>';
    else h+='<div class="vote-status muted">Belum memilih. Suara Anda satu dari lima per indikator.</div>';
    if(!locked){ var sdis=(!complete||submitted);
      h+='<div style="margin-top:14px;text-align:center"><button class="btn btn-gold" id="ldBpdSubmit"'+(sdis?' disabled':'')+'>'+(submitted?'&#10003; Sudah Terkirim':'Kirim Penilaian Saya')+'</button></div>'; }
    h+='</div>'; p.innerHTML=h;
    if(!locked){ p.querySelectorAll('.tbtn').forEach(b=>{ b.onclick=()=>vote(b.dataset.i,b.dataset.t); });
      var sb=document.getElementById('ldBpdSubmit'); if(sb&&complete&&!submitted) sb.onclick=submitMine; }
  }
  function vote(ind,tier){
    if(!pres||pres===MY_GID) return;
    if(S.locked){ showToast('Sesi terkunci','err'); return; }
    var u={}; u[ind]=tier; u._submitted=false;
    dbRef('/bpd/'+pres+'/peers/'+MY_GID).update(u)
      .then(()=>showToast('Defense '+ind.toUpperCase()+' terpilih'))
      .catch(()=>showToast('Gagal mengirim suara','err'));
  }
  function submitMine(){
    if(!pres||pres===MY_GID) return;
    if(S.locked){ showToast('Sesi terkunci','err'); return; }
    dbRef('/bpd/'+pres+'/peers/'+MY_GID+'/_submitted').set(true)
      .then(()=>showToast('Penilaian Defense Anda terkirim lengkap'))
      .catch(()=>showToast('Gagal mengirim','err'));
  }
  function attach(){
    if(bpref){ bpref.off(); bpref=null; }
    if(!pres){ BP=null; render(); return; }
    bpref=dbRef('/bpd/'+pres);
    bpref.on('value',snap=>{ BP=snap.val()||{}; render(); });
  }
  dbRef('/bpd').on('value',snap=>{
    const d=snap.val()||{}; const np=d._presenting||null; pres=np;
    if(np!==cur){ cur=np; attach(); } else { render(); }
  });
})();
bindConnState();
})();
</script>
</body>
</html>
